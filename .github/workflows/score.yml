name: Score submission

# Auto-scores a competition entry on PR. A submission is a JSON file under submissions/:
#   {"tier": "t1_paddock", "author": "you", "title": "my policy",
#    "kind": "registry|callable|checkpoint", "ref": "flank | mod:attr | path/to/actor.pt"}
# The core path needs only base deps (no torch); checkpoint entries need the `needs-torch`
# label so the heavier stack is only installed when actually required.

on:
  pull_request:
    paths:
      - "submissions/**"
      - "leaderboard/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (base deps; torch only if labelled)
        run: |
          python -m pip install -U pip
          if echo '${{ join(github.event.pull_request.labels.*.name, ',') }}' | grep -q needs-torch; then
            pip install -e ".[train]"
          else
            pip install -e .
          fi

      - name: Score each submission and build a report
        id: score
        run: |
          set -e
          shopt -s nullglob
          : > report.md
          echo "### 🐕🐑 Shepherd-Gym scores" >> report.md
          echo "" >> report.md
          echo "| submission | tier | score | pen | welfare | success |" >> report.md
          echo "|---|---|---|---|---|---|" >> report.md
          for f in submissions/*.json; do
            python scripts/ci_score.py "$f" >> report.md
          done
          cat report.md

      - name: Post score as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
